---
- name: Include role for kube-bench Molecule tests
  hosts: all
  become: false
  gather_facts: true
  tasks:
    - name: Include role for kube-bench Molecule tests
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
