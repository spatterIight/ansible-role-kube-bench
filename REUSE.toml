version = 1

# Computer-generated files and other files which cannot be copyrighted
[[annotations]]
path = [
    ".ansible-lint",
    ".github/workflows/pre-commit.yml",
    ".gitignore",
    ".pre-commit-config.yaml",
    ".python-version",
    ".yamllint.yml",
    "LICENSE",
    "README.md",
    "meta/main.yml",
    "molecule/**/requirements.yml",
    "molecule/README.md",
    "molecule/requirements.txt",
    "renovate.json",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# Upstream kube-bench job manifests (Apache-2.0), modified only slightly
[[annotations]]
path = [
    "templates/job*.yaml.j2",
]
SPDX-FileCopyrightText = "Aqua Security Software Ltd."
SPDX-License-Identifier = "Apache-2.0"
