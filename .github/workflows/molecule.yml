---
name: molecule

on: [push, pull_request]  # yamllint disable-line rule:truthy

jobs:
  molecule:
    name: Run Molecule scenario '${{ matrix.scenario }}' with kind-molecule ${{ matrix.version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version:
          - v1.0.0
        scenario:
          - default
      fail-fast: false

    env:
      MOLECULE_VERSION: ${{ matrix.version }}
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          path: kube-bench

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: kube-bench/.python-version
          cache: pip
          cache-dependency-path: kube-bench/molecule/requirements.txt

      - name: Install Python dependencies
        working-directory: kube-bench
        run: pip install -r molecule/requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v5.0.5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('kube-bench/molecule/default/requirements.yml') }}

      - name: Install Ansible collections
        working-directory: kube-bench
        run: ansible-galaxy collection install -r molecule/default/requirements.yml

      - name: Run Molecule
        working-directory: kube-bench
        run: molecule test --scenario-name ${{ matrix.scenario }}
